name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v0.1.4)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          zip -r images.zip images/
          cp README.md README_${{ github.event.inputs.version }}.md
          cp INSTALL.md INSTALL_${{ github.event.inputs.version }}.md
          cp theme-melosso.css melosso_${{ github.event.inputs.version }}.css
          cp theme-melosso-dark.css melosso-dark_${{ github.event.inputs.version }}.css
          cp theme-melosso-light.css melosso-light_${{ github.event.inputs.version }}.css

      - name: Create Tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: |
            images.zip
            README_${{ github.event.inputs.version }}.md
            INSTALL_${{ github.event.inputs.version }}.md
            melosso_${{ github.event.inputs.version }}.css
            melosso-dark_${{ github.event.inputs.version }}.css
            melosso-light_${{ github.event.inputs.version }}.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}