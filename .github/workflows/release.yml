name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v0.1.4)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          RELEASE_NAME="melosso-theme-${{ github.event.inputs.version }}"
          mkdir -p $RELEASE_NAME
          cp -r images/ $RELEASE_NAME/images/
          cp README.md $RELEASE_NAME/README.md
          cp INSTALL.md $RELEASE_NAME/INSTALL.md
          cp theme-melosso.css $RELEASE_NAME/theme-melosso.css
          cp theme-melosso-dark.css $RELEASE_NAME/theme-melosso-dark.css
          cp theme-melosso-light.css $RELEASE_NAME/theme-melosso-light.css
          zip -r ${RELEASE_NAME}.zip $RELEASE_NAME

      - name: Create Tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: melosso-theme-${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}